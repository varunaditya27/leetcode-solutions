name: Sync LeetCode

on:
  workflow_dispatch:
  schedule:
    - cron: "30 14 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Sync LeetCode Submissions
        uses: joshcai/leetcode-sync@v1.7
        with:
          github-token: ${{ github.token }}
          leetcode-csrf-token: ${{ secrets.LEETCODE_CSRF_TOKEN }}
          leetcode-session: ${{ secrets.LEETCODE_SESSION }}
          destination-folder: solutions
          verbose: true
          commit-header: "[LeetCode Sync]"
          filter-duplicate-secs: 86400

      # ↓ THIS IS THE FIX — pull the files the sync just committed via API
      - name: Pull Latest Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main --rebase

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Reorganize by Difficulty
        run: python scripts/reorganize.py

      - name: Commit Reorganized Structure
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "[LeetCode Sync] Reorganize by difficulty"
          file_pattern: "solutions/**"